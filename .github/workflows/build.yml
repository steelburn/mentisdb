name: Build

on:
  push:
    branches: ["master", "main"]
    tags: ["*"]
  pull_request:
    branches: ["master", "main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: mentisdbd (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: mentisdbd
            artifact: mentisdbd-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: mentisdbd
            artifact: mentisdbd-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: mentisdbd
            artifact: mentisdbd-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: mentisdbd.exe
            artifact: mentisdbd-windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-build-

      - name: Build mentisdbd (release)
        run: cargo build --bin mentisdbd --release --target ${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}
          retention-days: 30

      # On tagged releases, attach binaries to the GitHub Release
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/${{ matrix.binary }}
          token: ${{ secrets.GITHUB_TOKEN }}
